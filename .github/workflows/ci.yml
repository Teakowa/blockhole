name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check
        run: |
          cargo fmt --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test
      - name: Build release CLI
        run: cargo build --release --locked
      - name: Cache release binary
        uses: actions/cache/save@v6
        with:
          path: target/release/blockhole
          key: blockhole-linux-x86_64-${{ hashFiles('Cargo.lock', 'src/**', 'Cargo.toml') }}

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          npx --package=semantic-release@24.2.1 \
              --package=@semantic-release/exec@6.0.3 \
              --package=@semantic-release/github@11.0.1 \
              semantic-release
