name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - name: Install uv and dependencies
        run: python -m pip install uv && uv sync --frozen
      - name: Check
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src
          uv run pytest
