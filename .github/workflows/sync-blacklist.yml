name: Sync blacklist

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Do not write the Cloudflare list"
        required: false
        default: false
        type: boolean
      lookback_hours:
        description: "Analytics lookback window"
        required: false
        default: "24"
        type: string
      force_rebuild:
        description: "Re-evaluate all available state"
        required: false
        default: false
        type: boolean
      allow_empty:
        description: "Allow an explicit empty-list replacement"
        required: false
        default: false
        type: boolean

concurrency:
  group: blacklist-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Load blacklist state
        env:
          STATE_BRANCH: blacklist-state
        run: |
          git fetch --no-tags origin "refs/heads/${STATE_BRANCH}:refs/remotes/origin/${STATE_BRANCH}"
          mkdir -p data dist reports
          git archive "origin/${STATE_BRANCH}" -- data/state.json dist reports/latest.md | tar -x
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install uv and dependencies
        run: python -m pip install uv && uv sync --frozen
      - name: Validate and run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_IDS: ${{ vars.CLOUDFLARE_ZONE_IDS }}
          CLOUDFLARE_LIST_ID: ${{ vars.CLOUDFLARE_LIST_ID }}
        run: |
          uv run cf-ip-blacklist validate
          uv run cf-ip-blacklist run \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }} \
            --lookback-hours "${{ inputs.lookback_hours || '24' }}" \
            ${{ inputs.allow_empty == 'true' && '--allow-empty' || '' }}
      - name: Commit generated state to blacklist-state
        env:
          STATE_BRANCH: blacklist-state
        run: |
          state_dir="${RUNNER_TEMP}/blackhole-${STATE_BRANCH}"
          git worktree add --detach "${state_dir}" "origin/${STATE_BRANCH}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp data/state.json "${state_dir}/data/state.json"
          cp dist/blacklist.txt "${state_dir}/dist/blacklist.txt"
          cp dist/cloudflare-list.json "${state_dir}/dist/cloudflare-list.json"
          cp reports/latest.md "${state_dir}/reports/latest.md"
          git -C "${state_dir}" config user.name "github-actions[bot]"
          git -C "${state_dir}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${state_dir}" add data/state.json dist/ reports/latest.md
          if git -C "${state_dir}" diff --cached --quiet; then
            echo "No blacklist state changes"
          else
            git -C "${state_dir}" commit -m "chore(blacklist): update"
            git -C "${state_dir}" push origin "HEAD:${STATE_BRANCH}"
          fi
