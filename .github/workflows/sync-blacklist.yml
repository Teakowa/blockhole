name: Sync blacklist

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Do not write the Cloudflare list"
        required: false
        default: true
        type: boolean
      lookback_hours:
        description: "Analytics lookback window"
        required: false
        default: "24"
        type: string
      force_rebuild:
        description: "Re-evaluate all available state"
        required: false
        default: false
        type: boolean
      allow_empty:
        description: "Allow an explicit empty-list replacement"
        required: false
        default: false
        type: boolean

concurrency:
  group: blacklist-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - name: Install uv and dependencies
        run: python -m pip install uv && uv sync --frozen
      - name: Validate and run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_IDS: ${{ vars.CLOUDFLARE_ZONE_IDS }}
          CLOUDFLARE_LIST_ID: ${{ vars.CLOUDFLARE_LIST_ID }}
        run: |
          uv run cf-ip-blacklist validate
          uv run cf-ip-blacklist run \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }} \
            --lookback-hours "${{ inputs.lookback_hours || '24' }}" \
            ${{ inputs.allow_empty == 'true' && '--allow-empty' || '' }}
      - name: Commit generated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json dist/ reports/latest.md
          git diff --cached --quiet || git commit -m "chore(blacklist): update"
          git push
