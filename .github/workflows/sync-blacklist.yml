name: Sync blacklist

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "dry-run"
        required: false
        default: false
        type: boolean
      lookback_hours:
        description: "lookback-hours"
        required: false
        default: "24"
        type: string
      force_rebuild:
        description: "force-rebuild"
        required: false
        default: false
        type: boolean
      allow_empty:
        description: "allow-empty"
        required: false
        default: false
        type: boolean

concurrency:
  group: blacklist-sync
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  sync:
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Load blacklist state
        env:
          STATE_BRANCH: blacklist-state
        run: |
          git fetch --no-tags origin "refs/heads/${STATE_BRANCH}:refs/remotes/origin/${STATE_BRANCH}"
          mkdir -p data dist reports
          git archive "origin/${STATE_BRANCH}" -- data/state.json dist reports/latest.md | tar -x
      - name: Restore cached CLI
        id: cli-cache
        uses: actions/cache/restore@v6
        with:
          path: target/release/blockhole
          key: blockhole-linux-x86_64-${{ hashFiles('Cargo.lock', 'src/**', 'Cargo.toml') }}
      - name: Download CLI from release
        if: steps.cli-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p target/release
          gh release download --repo "${GITHUB_REPOSITORY}" \
            --pattern "blockhole" \
            --output target/release/blockhole
          chmod +x target/release/blockhole
      - name: Set CLI path
        run: |
          chmod +x target/release/blockhole
          echo "BLOCKHOLE_BIN=$(pwd)/target/release/blockhole" >> "${GITHUB_ENV}"
      - name: Validate and run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_IDS: ${{ vars.CLOUDFLARE_ZONE_IDS }}
          CLOUDFLARE_LIST_ID: ${{ vars.CLOUDFLARE_LIST_ID }}
        run: |
          "${BLOCKHOLE_BIN}" validate
          "${BLOCKHOLE_BIN}" run \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }} \
            --lookback-hours "${{ inputs.lookback_hours || '24' }}" \
            ${{ inputs.allow_empty == 'true' && '--allow-empty' || '' }}
      - name: Commit generated state to blacklist-state
        env:
          STATE_BRANCH: blacklist-state
        run: |
          state_dir="${RUNNER_TEMP}/blackhole-${STATE_BRANCH}"
          git worktree add --detach "${state_dir}" "origin/${STATE_BRANCH}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp data/state.json "${state_dir}/data/state.json"
          cp dist/blacklist.txt "${state_dir}/dist/blacklist.txt"
          cp dist/cloudflare-list.json "${state_dir}/dist/cloudflare-list.json"
          cp reports/latest.md "${state_dir}/reports/latest.md"
          git -C "${state_dir}" config user.name "github-actions[bot]"
          git -C "${state_dir}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${state_dir}" add data/state.json dist/ reports/latest.md
          if git -C "${state_dir}" diff --cached --quiet; then
            echo "No blacklist state changes"
          else
            # Count added/removed lines in blacklist.txt
            added=$(git -C "${state_dir}" diff --cached -- dist/blacklist.txt \
              | grep '^+' | grep -v '^+++' | grep -cv '^\s*#' || true)
            removed=$(git -C "${state_dir}" diff --cached -- dist/blacklist.txt \
              | grep '^-' | grep -v '^---' | grep -cv '^\s*#' || true)
            # Read total blocked IPs from state.json
            total=$(python3 -c "
          import json, sys
          data = json.load(open('${state_dir}/data/state.json'))
          ips = data.get('ips', {})
          blocked = sum(1 for v in ips.values() if v.get('state') == 'blocked')
          print(blocked)
          " 2>/dev/null || echo "?")
            # Build summary suffix
            summary="+${added}/-${removed} IPs, ${total} blocked"
            git -C "${state_dir}" commit -m "chore(blacklist): update [${summary}]"
            git -C "${state_dir}" push origin "HEAD:${STATE_BRANCH}"
          fi
